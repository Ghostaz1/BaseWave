{% extends 'shops/tourist_base.html' %}
{% block title %}Book Listing | Basewave{% endblock %}
{% block content %}
<div style="background:white; border-radius:16px; padding:32px; max-width:480px; margin:0 auto; box-shadow:0 2px 12px rgba(0,0,0,0.06);">
    <h2 style="font-size:20px; font-weight:800; margin-bottom:6px;">Book: {{ listing.title }}</h2>
    <p style="font-size:13px; color:#5A6472; margin-bottom:2px;">🏪 {{ listing.shop.shop_name }}</p>
    <p style="font-size:17px; font-weight:900; color:#006BA6; margin-bottom:24px;">₱{{ listing.price_per_day }}<span style="font-size:12px; font-weight:600; color:#8A96A3;"> /day</span></p>

    <form method="POST">
        {% csrf_token %}
        <div style="margin-bottom:14px;">
            <label style="display:block; font-size:13px; font-weight:700; color:#5A6472; margin-bottom:5px;">Start Date</label>
            <input type="date" name="start_date" required style="width:100%; padding:11px 14px; border:1.5px solid #E8ECF2; border-radius:10px; font-size:14px;">
        </div>
        <div style="margin-bottom:20px;">
            <label style="display:block; font-size:13px; font-weight:700; color:#5A6472; margin-bottom:5px;">End Date</label>
            <input type="date" name="end_date" required style="width:100%; padding:11px 14px; border:1.5px solid #E8ECF2; border-radius:10px; font-size:14px;">
        </div>
        <button type="submit" style="width:100%; padding:14px; border:none; border-radius:12px; background:#006BA6; color:white; font-size:15px; font-weight:700; cursor:pointer;">Confirm Booking</button>
    </form>
</div>
{% endblock %}
