{% extends 'shops/shop_owner_base.html' %}
{% block title %}Create Shop | Basewave{% endblock %}
{% block content %}
<div style="background:white; border-radius:16px; padding:32px; max-width:520px; margin:0 auto; box-shadow:0 2px 12px rgba(0,0,0,0.06);">
    <h2 style="font-size:20px; font-weight:800; margin-bottom:6px;">Create Your Shop</h2>
    <p style="font-size:13px; color:#8A96A3; margin-bottom:24px;">Set up your shop so tourists can find and book your listings.</p>

    <form method="POST">
        {% csrf_token %}
        <div style="margin-bottom:14px;">
            <label style="display:block; font-size:13px; font-weight:700; color:#5A6472; margin-bottom:5px;">Shop Name</label>
            <input type="text" name="shop_name" required style="width:100%; padding:11px 14px; border:1.5px solid #E8ECF2; border-radius:10px; font-size:14px;">
        </div>
        <div style="margin-bottom:14px;">
            <label style="display:block; font-size:13px; font-weight:700; color:#5A6472; margin-bottom:5px;">Description</label>
            <textarea name="description" rows="3" style="width:100%; padding:11px 14px; border:1.5px solid #E8ECF2; border-radius:10px; font-size:14px; resize:vertical;"></textarea>
        </div>
        <div style="margin-bottom:14px;">
            <label style="display:block; font-size:13px; font-weight:700; color:#5A6472; margin-bottom:5px;">Contact Number</label>
            <input type="text" name="contact_number" required style="width:100%; padding:11px 14px; border:1.5px solid #E8ECF2; border-radius:10px; font-size:14px;">
        </div>
        <div style="margin-bottom:20px;">
            <label style="display:block; font-size:13px; font-weight:700; color:#5A6472; margin-bottom:5px;">Location</label>
            <input type="text" name="location" required style="width:100%; padding:11px 14px; border:1.5px solid #E8ECF2; border-radius:10px; font-size:14px;">
        </div>
        <button type="submit" style="width:100%; padding:14px; border:none; border-radius:12px; background:#006BA6; color:white; font-size:15px; font-weight:700; cursor:pointer;">Create Shop</button>
    </form>
</div>
{% endblock %}
